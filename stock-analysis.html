<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Analysis — Sentiquant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ───────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #090c10;
      --surface:    #0f1318;
      --surface-2:  #141920;
      --border:     rgba(255, 255, 255, 0.07);
      --border-h:   rgba(255, 255, 255, 0.14);
      --accent:     #00d4aa;
      --accent-dim: rgba(0, 212, 170, 0.12);
      --blue:       #3b82f6;
      --green:      #10b981;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --text:       #e8eaf0;
      --muted:      #6b7280;
      --muted-2:    #4b5563;
      --radius:     14px;
      --radius-sm:  8px;
      --header-h:   64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--header-h);
      background: rgba(9, 12, 16, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .header-inner {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(90deg, #3b82f6, #00d4aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .btn-back:hover {
      color: var(--text);
      border-color: var(--border-h);
      background: rgba(255,255,255,0.04);
    }

    /* ── Container ───────────────────────────── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    /* ── Stock Hero ──────────────────────────── */
    .stock-hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .stock-symbol {
      font-family: 'Syne', sans-serif;
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
      margin-bottom: 8px;
    }

    .stock-name {
      font-size: 16px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Card Base ───────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* ── Price Card ──────────────────────────── */
    .price-card {
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.08) 0%, rgba(99, 102, 241, 0.08) 100%);
      border: 1px solid rgba(0, 212, 170, 0.2);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .price-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,212,170,0.06), transparent);
      pointer-events: none;
    }

    .price-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .price-value {
      font-family: 'DM Mono', monospace;
      font-size: 56px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .price-symbol {
      font-size: 32px;
      opacity: 0.6;
    }

    /* ── Score + Recommendation Row ─────────── */
    .score-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    /* Score Card */
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .score-number {
      font-family: 'DM Mono', monospace;
      font-size: 64px;
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #00d4aa, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .score-max {
      font-size: 18px;
      opacity: 0.45;
    }

    .score-bar-track {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
      margin-top: 14px;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #00d4aa, #3b82f6);
      width: 0%; /* animated via JS */
      transition: width 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Recommendation Card */
    .rec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .rec-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 2px solid;
    }

    .rec-badge.buy  { background: rgba(16, 185, 129, 0.1);  border-color: rgba(16, 185, 129, 0.35); color: #10b981; }
    .rec-badge.sell { background: rgba(239, 68, 68, 0.1);   border-color: rgba(239, 68, 68, 0.35);  color: #ef4444; }
    .rec-badge.hold { background: rgba(245, 158, 11, 0.1);  border-color: rgba(245, 158, 11, 0.35); color: #f59e0b; }
    .rec-badge.neutral { background: rgba(107,114,128,0.1); border-color: rgba(107,114,128,0.3);    color: #9ca3af; }

    .rec-desc {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ── Trading Levels Grid ─────────────────── */
    .levels-section {
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .levels-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .level-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      border: 1px solid;
      position: relative;
      overflow: hidden;
    }

    .level-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    /* Entry — Blue */
    .level-entry {
      border-color: rgba(59, 130, 246, 0.2);
    }
    .level-entry::before { background: var(--blue); }
    .level-entry .level-price { color: var(--blue); }
    .level-entry .level-pct   { background: rgba(59,130,246,0.1); color: var(--blue); border-color: rgba(59,130,246,0.25); }
    .level-entry .level-icon  { color: var(--blue); }

    /* Target — Green */
    .level-target {
      border-color: rgba(16, 185, 129, 0.2);
    }
    .level-target::before { background: var(--green); }
    .level-target .level-price { color: var(--green); }
    .level-target .level-pct   { background: rgba(16,185,129,0.1); color: var(--green); border-color: rgba(16,185,129,0.25); }
    .level-target .level-icon  { color: var(--green); }

    /* Stop Loss — Red */
    .level-stop {
      border-color: rgba(239, 68, 68, 0.2);
    }
    .level-stop::before { background: var(--red); }
    .level-stop .level-price { color: var(--red); }
    .level-stop .level-pct   { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.25); }
    .level-stop .level-icon  { color: var(--red); }

    .level-icon { margin-bottom: 2px; }

    .level-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .level-price {
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .level-pct {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 100px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }

    /* ── Analysis Text ───────────────────────── */
    .analysis-section {
      margin-bottom: 20px;
    }

    .analysis-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .analysis-text {
      font-size: 15px;
      color: #b0b8c8;
      line-height: 1.75;
      font-weight: 400;
    }

    /* ── Disclaimer ──────────────────────────── */
    .disclaimer {
      background: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.18);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
    }

    .disclaimer-icon { flex-shrink: 0; margin-top: 1px; }

    .disclaimer-text {
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.65;
    }

    .disclaimer-text strong {
      color: #d97706;
      font-weight: 600;
    }

    /* ── States ──────────────────────────────── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 24px;
      text-align: center;
    }

    .state-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .state-icon.loading { background: rgba(0, 212, 170, 0.08); }
    .state-icon.error   { background: rgba(239, 68, 68, 0.08); }

    .state-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
    .state-msg   { font-size: 14px; color: var(--muted); max-width: 320px; line-height: 1.6; }

    /* ── Skeleton ────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .sk {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.09) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 6px;
    }

    /* Shared skeleton card shell */
    .sk-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* Reusable bar sizes */
    .sk-h8  { height: 8px;  }
    .sk-h12 { height: 12px; }
    .sk-h16 { height: 16px; }
    .sk-h28 { height: 28px; }
    .sk-h40 { height: 40px; }
    .sk-h56 { height: 56px; }
    .sk-h64 { height: 64px; }

    /* Pulse on skeleton cards — slightly different timing to feel alive */
    .sk-card:nth-child(2) .sk { animation-delay: 0.15s; }
    .sk-card:nth-child(3) .sk { animation-delay: 0.30s; }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(0, 212, 170, 0.3);
      background: rgba(0, 212, 170, 0.08);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .btn-retry:hover {
      background: rgba(0, 212, 170, 0.14);
      border-color: rgba(0, 212, 170, 0.5);
    }

    /* ── Timestamp ───────────────────────────── */
    .timestamp {
      font-size: 11px;
      color: var(--muted-2);
      text-align: center;
      margin-top: 12px;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 768px) {
      .container { padding: 32px 16px 80px; }
      .stock-symbol { font-size: 40px; }
      .price-value  { font-size: 44px; }
      .score-section  { grid-template-columns: 1fr; }
      .levels-grid    { grid-template-columns: 1fr; }
      .score-number   { font-size: 52px; }
      .level-price    { font-size: 24px; }
    }

    @media (max-width: 480px) {
      .stock-symbol { font-size: 32px; }
      .price-value  { font-size: 36px; }
      .price-symbol { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <a href="stocks.html" class="logo">Sentiquant</a>
      <a href="stocks.html" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3L5 7l4 4"/>
        </svg>
        Back to Stocks
      </a>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────── -->
  <main class="container" id="mainContent">
    <!-- Populated by JS -->
  </main>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    // ── Auth guard ────────────────────────────
    const token = localStorage.getItem('accessToken');
    if (!token) {
      window.location.href = 'index.html';
    }

    // ── Get symbol from URL ───────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const symbol = urlParams.get('symbol');
    if (!symbol) {
      window.location.href = 'stocks.html';
    }

    // Update page title early
    document.title = `${symbol} Analysis — Sentiquant`;

    // ── Helpers ───────────────────────────────

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatPrice(num) {
      if (num == null) return '—';
      return Number(num).toLocaleString('en-IN', { maximumFractionDigits: 2 });
    }

    function pctChange(from, to) {
      if (!from || !to) return null;
      return ((to - from) / Math.abs(from) * 100).toFixed(2);
    }

    // ── Logout ────────────────────────────────
    async function logout() {
      const rt = localStorage.getItem('refreshToken');
      try {
        await fetch(`${API_BASE}/auth/logout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ refreshToken: rt }),
        });
      } catch { /* always clear local data even if network fails */ }
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      window.location.href = 'index.html';
    }

    // ── Recommendation config ─────────────────
    // Returns null when rec is absent so the section is omitted entirely.
    function recConfig(rec) {
      if (!rec) return null;
      const r = rec.toUpperCase();
      if (r === 'BUY'  || r === 'STRONG BUY')  return { cls: 'buy',  label: rec, desc: 'Positive outlook — consider entry at suggested levels.' };
      if (r === 'SELL' || r === 'STRONG SELL') return { cls: 'sell', label: rec, desc: 'Negative outlook — consider reducing or exiting positions.' };
      if (r === 'HOLD')                         return { cls: 'hold', label: rec, desc: 'Mixed signals — maintain current position if held.' };
      return { cls: 'neutral', label: rec, desc: 'Signal available — review levels before acting.' };
    }

    // ── Render states ─────────────────────────

    function showSkeletonAnalysis() {
      document.getElementById('mainContent').innerHTML = `

        <!-- Hero skeleton: symbol + name -->
        <div class="stock-hero">
          <div class="sk sk-h56" style="width:160px;margin:0 auto 12px;border-radius:10px"></div>
          <div class="sk sk-h16" style="width:220px;margin:0 auto"></div>
        </div>

        <!-- Price card skeleton -->
        <div class="price-card" style="margin-bottom:20px">
          <div class="sk sk-h12" style="width:88px;margin:0 auto 14px;border-radius:4px"></div>
          <div class="sk sk-h56" style="width:200px;margin:0 auto;border-radius:10px"></div>
        </div>

        <!-- Score + Recommendation skeleton -->
        <div class="score-section" style="margin-bottom:20px">
          <div class="sk-card" style="text-align:center">
            <div class="sk sk-h12" style="width:64px;margin:0 auto 16px;border-radius:4px"></div>
            <div class="sk sk-h64" style="width:130px;margin:0 auto 16px;border-radius:10px"></div>
            <div class="sk sk-h8"  style="width:100%;border-radius:100px"></div>
          </div>
          <div class="sk-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
            <div class="sk sk-h12" style="width:96px;border-radius:4px"></div>
            <div class="sk sk-h40" style="width:140px;border-radius:10px"></div>
            <div class="sk sk-h16" style="width:80%;border-radius:4px"></div>
          </div>
        </div>

        <!-- Trading levels skeleton -->
        <div class="levels-section" style="margin-bottom:20px">
          <div class="sk sk-h12" style="width:110px;margin-bottom:14px;border-radius:4px"></div>
          <div class="levels-grid">
            ${['level-entry','level-target','level-stop'].map(() => `
              <div class="level-card" style="border-color:rgba(255,255,255,0.07)">
                <div class="sk" style="width:18px;height:18px;border-radius:4px"></div>
                <div class="sk sk-h12" style="width:52px;border-radius:4px"></div>
                <div class="sk sk-h28" style="width:110px;border-radius:8px"></div>
                <div class="sk sk-h16" style="width:52px;border-radius:100px"></div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Analysis text skeleton -->
        <div class="analysis-section" style="margin-bottom:20px">
          <div class="sk sk-h12" style="width:80px;margin-bottom:14px;border-radius:4px"></div>
          <div class="sk-card" style="display:flex;flex-direction:column;gap:10px">
            <div class="sk sk-h16" style="width:100%"></div>
            <div class="sk sk-h16" style="width:92%"></div>
            <div class="sk sk-h16" style="width:78%"></div>
            <div class="sk sk-h16" style="width:85%"></div>
          </div>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('mainContent').innerHTML = `
        <div class="state-box">
          <div class="state-icon error">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4M12 16h.01"/>
            </svg>
          </div>
          <p class="state-title">Analysis failed</p>
          <p class="state-msg">${escapeHtml(msg)}</p>
          <a class="btn-retry" onclick="fetchAnalysis()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
              <path d="M12 2a5.5 5.5 0 10.9 4M12 2v4h-4"/>
            </svg>
            Retry
          </a>
        </div>`;
    }

    // ── Render analysis ───────────────────────
    function renderAnalysis(data) {
      if (!data || !data.current_price) {
        showError('Invalid analysis data from server — missing price information.');
        return;
      }
      if (!data.analysis || !data.analysis.entry || !data.analysis.target || !data.analysis.stop_loss) {
        showError('Invalid analysis data from server — missing trading levels.');
        return;
      }

      const a        = data.analysis;
      const name     = data.name || '';
      const price    = data.current_price;
      const entry    = a.entry;
      const target   = a.target;
      const stop     = a.stop_loss;
      const score    = a.score;
      const rec      = recConfig(a.recommendation);
      const text     = a.analysis_text || '';
      const now      = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

      // Percentage calculations
      const entryPct  = pctChange(price, entry);     // entry vs current
      const targetPct = pctChange(entry || price, target); // target gain from entry
      const stopPct   = pctChange(entry || price, stop);   // stop loss from entry

      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <!-- Stock hero -->
        <div class="stock-hero">
          <div class="stock-symbol">${escapeHtml(symbol)}</div>
          ${name ? `<div class="stock-name">${escapeHtml(name)}</div>` : ''}
        </div>

        <!-- Current price -->
        <div class="price-card">
          <p class="price-label">Current Price</p>
          <div class="price-value">
            <span class="price-symbol">₹</span>${formatPrice(price)}
          </div>
        </div>

        <!-- Score + Recommendation -->
        <div class="score-section">
          <!-- AI Score -->
          <div class="score-card">
            <p class="card-label">AI Score</p>
            <div class="score-number">
              ${score != null ? Math.round(score) : '—'}<span class="score-max">/100</span>
            </div>
            <div class="score-bar-track">
              <div class="score-bar-fill" id="scoreBar"></div>
            </div>
          </div>

          <!-- Recommendation -->
          ${rec ? `
          <div class="rec-card">
            <p class="card-label">Recommendation</p>
            <div class="rec-badge ${rec.cls}">${escapeHtml(rec.label)}</div>
            <p class="rec-desc">${rec.desc}</p>
          </div>` : ''}
        </div>

        <!-- Trading Levels -->
        <div class="levels-section">
          <h3 class="section-title">Trading Levels</h3>
          <div class="levels-grid">

            <!-- Entry -->
            <div class="level-card level-entry">
              <div class="level-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                  <path d="M3 9h12M9 4l5 5-5 5"/>
                </svg>
              </div>
              <span class="level-label">Entry</span>
              <div class="level-price">₹${formatPrice(entry)}</div>
              ${entryPct !== null ? `<span class="level-pct">${entryPct >= 0 ? '+' : ''}${entryPct}%</span>` : ''}
            </div>

            <!-- Target -->
            <div class="level-card level-target">
              <div class="level-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                  <circle cx="9" cy="9" r="7"/><circle cx="9" cy="9" r="3"/><circle cx="9" cy="9" r="0.5" fill="currentColor"/>
                </svg>
              </div>
              <span class="level-label">Target</span>
              <div class="level-price">₹${formatPrice(target)}</div>
              ${targetPct !== null ? `<span class="level-pct">+${targetPct}%</span>` : ''}
            </div>

            <!-- Stop Loss -->
            <div class="level-card level-stop">
              <div class="level-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                  <path d="M9 3v12M4.5 7.5l4.5-4.5 4.5 4.5"/>
                  <path d="M3 14h12" stroke-opacity="0.4"/>
                </svg>
              </div>
              <span class="level-label">Stop Loss</span>
              <div class="level-price">₹${formatPrice(stop)}</div>
              ${stopPct !== null ? `<span class="level-pct">${stopPct}%</span>` : ''}
            </div>

          </div>
        </div>

        <!-- Analysis text -->
        ${text ? `
        <div class="analysis-section">
          <h3 class="section-title">AI Analysis</h3>
          <div class="analysis-card">
            <p class="analysis-text">${escapeHtml(text)}</p>
          </div>
        </div>` : ''}

        <!-- Disclaimer -->
        <div class="disclaimer">
          <div class="disclaimer-icon">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round">
              <path d="M7 1L1 13h12L7 1z"/><path d="M7 6v3M7 10.5v.5"/>
            </svg>
          </div>
          <p class="disclaimer-text">
            <strong>Disclaimer:</strong> This analysis is AI-generated for informational purposes only and does not constitute financial advice.
            Past performance is not indicative of future results. Always conduct your own research and consult a qualified financial advisor
            before making any investment decisions.
          </p>
        </div>

        <p class="timestamp">Generated · ${now}</p>
      `;

      // Animate score bar after DOM is ready
      if (score != null) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const bar = document.getElementById('scoreBar');
            if (bar) bar.style.width = `${Math.min(100, Math.max(0, score))}%`;
          });
        });
      }
    }

    // ── Fetch analysis ────────────────────────
    async function fetchAnalysis() {
      showSkeletonAnalysis();
      try {
        const res = await fetch(`${API_BASE}/analyze/swing/${encodeURIComponent(symbol)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) {
          localStorage.removeItem('accessToken');
          localStorage.removeItem('refreshToken');
          window.location.href = 'index.html';
          return;
        }

        if (res.status === 404) {
          showError(`No analysis found for "${symbol}". The stock may not be supported.`);
          return;
        }

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const data = await res.json();
        renderAnalysis(data);
      } catch (err) {
        showError(err.message || 'Unable to reach the server. Please try again.');
      }
    }

    // ── Init ──────────────────────────────────
    fetchAnalysis();
  </script>
</body>
</html>
