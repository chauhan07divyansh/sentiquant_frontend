<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Sentiquant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ───────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #090c10;
      --surface:    #0f1318;
      --surface-2:  #141920;
      --border:     rgba(255, 255, 255, 0.07);
      --border-h:   rgba(255, 255, 255, 0.14);
      --accent:     #00d4aa;
      --accent-dim: rgba(0, 212, 170, 0.12);
      --blue:       #3b82f6;
      --text:       #e8eaf0;
      --muted:      #6b7280;
      --muted-2:    #4b5563;
      --radius:     12px;
      --radius-sm:  8px;
      --header-h:   64px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 30;
      height: var(--header-h);
      background: rgba(9, 12, 16, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .header-inner {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(90deg, #3b82f6, #00d4aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .btn-logout {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(239, 68, 68, 0.25);
      background: transparent;
      color: #f87171;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* ── Main ────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Welcome hero ────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 40px;
    }

    .hero-greeting {
      font-size: 14px;
      color: var(--muted);
    }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .hero-plan {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-plan.free {
      background: rgba(107, 114, 128, 0.15);
      border: 1px solid rgba(107, 114, 128, 0.25);
      color: #9ca3af;
    }

    .hero-plan.pro {
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.25);
      color: var(--accent);
    }

    .hero-plan.enterprise {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: var(--blue);
    }

    /* ── Stats row ───────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Quick-action cards ───────────────────── */
    .section-heading {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .action-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .action-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .action-card.blue::before  { background: linear-gradient(135deg, rgba(59,130,246,0.06) 0%, transparent 60%); }
    .action-card.green::before { background: linear-gradient(135deg, rgba(0,212,170,0.06) 0%, transparent 60%); }

    .action-card:hover { border-color: var(--border-h); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .action-card:hover::before { opacity: 1; }

    .action-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .action-icon.blue  { background: rgba(59,130,246,0.12); color: var(--blue); }
    .action-icon.green { background: var(--accent-dim); color: var(--accent); }

    .action-title {
      font-weight: 600;
      font-size: 15px;
      color: #fff;
    }

    .action-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .action-arrow {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.15s ease, gap 0.15s ease;
    }

    .action-card:hover .action-arrow { color: var(--text); gap: 6px; }

    /* ── Account info section ─────────────────── */
    .account-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .account-row:last-child { border-bottom: none; }

    .account-key {
      font-size: 13px;
      color: var(--muted);
      min-width: 100px;
    }

    .account-val {
      font-size: 13px;
      color: var(--text);
      text-align: right;
      font-family: 'DM Mono', monospace;
    }

    /* ── Skeleton shimmer ────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    .sk {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.09) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 200% auto;
      border-radius: 6px;
      animation: shimmer 1.4s linear infinite;
    }

    .sk-hero-line1 { height: 14px; width: 120px; margin-bottom: 10px; }
    .sk-hero-line2 { height: 32px; width: 220px; margin-bottom: 8px; }
    .sk-hero-badge { height: 20px; width: 70px; border-radius: 999px; }

    .sk-stat-label { height: 12px; width: 80px; margin-bottom: 10px; }
    .sk-stat-value { height: 28px; width: 60px; margin-bottom: 6px; }
    .sk-stat-sub   { height: 11px; width: 100px; }

    .sk-account-key { height: 13px; width: 90px; }
    .sk-account-val { height: 13px; width: 140px; }

    /* Stagger delays */
    .sk:nth-child(1) { animation-delay: 0s; }
    .sk:nth-child(2) { animation-delay: 0.1s; }
    .sk:nth-child(3) { animation-delay: 0.2s; }
    .sk:nth-child(4) { animation-delay: 0.3s; }

    /* ── Spinner ─────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-sm {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 640px) {
      .hero-name { font-size: 24px; }
      .container { padding: 28px 16px 60px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="dashboard.html" class="logo">Sentiquant</a>
      <div class="header-right">
        <button class="btn-logout" onclick="logout()">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M5 7h7M9 5l2 2-2 2M9 2H3a1 1 0 00-1 1v8a1 1 0 001 1h6"/>
          </svg>
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <!-- Hero (skeleton → real) -->
    <div class="hero" id="heroSection">
      <div class="sk sk-hero-line1"></div>
      <div class="sk sk-hero-line2"></div>
      <div class="sk sk-hero-badge"></div>
    </div>

    <!-- Stats row (skeleton → real) -->
    <div class="stats-grid" id="statsGrid">
      <!-- 3 skeleton stat cards -->
      <div class="stat-card">
        <div class="sk sk-stat-label"></div>
        <div class="sk sk-stat-value"></div>
        <div class="sk sk-stat-sub"></div>
      </div>
      <div class="stat-card">
        <div class="sk sk-stat-label" style="animation-delay:.1s"></div>
        <div class="sk sk-stat-value" style="animation-delay:.1s"></div>
        <div class="sk sk-stat-sub"   style="animation-delay:.1s"></div>
      </div>
      <div class="stat-card">
        <div class="sk sk-stat-label" style="animation-delay:.2s"></div>
        <div class="sk sk-stat-value" style="animation-delay:.2s"></div>
        <div class="sk sk-stat-sub"   style="animation-delay:.2s"></div>
      </div>
    </div>

    <!-- Quick actions -->
    <p class="section-heading">Quick actions</p>
    <div class="actions-grid">

      <a href="stocks.html" class="action-card blue">
        <div class="action-icon blue">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
            <path d="M3 13l4-4 3 3 4-5 3 3"/>
            <path d="M3 17h14"/>
          </svg>
        </div>
        <div>
          <p class="action-title">Browse Stocks</p>
          <p class="action-desc">Explore the full stock universe and run AI-powered swing analysis.</p>
        </div>
        <div class="action-arrow">
          View all stocks
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M3 7h8M8 4l3 3-3 3"/>
          </svg>
        </div>
      </a>

      <a href="stocks.html" class="action-card green">
        <div class="action-icon green">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
            <circle cx="9" cy="9" r="6"/><path d="m15 15 3 3"/>
            <path d="M9 6v6M6 9h6"/>
          </svg>
        </div>
        <div>
          <p class="action-title">Analyse a Stock</p>
          <p class="action-desc">Search for any symbol and get instant AI sentiment + technical signals.</p>
        </div>
        <div class="action-arrow">
          Search stocks
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M3 7h8M8 4l3 3-3 3"/>
          </svg>
        </div>
      </a>

    </div>

    <!-- Account details -->
    <p class="section-heading">Account</p>
    <div class="account-card" id="accountCard">
      <!-- skeleton rows -->
      <div class="account-row">
        <div class="sk sk-account-key"></div>
        <div class="sk sk-account-val"></div>
      </div>
      <div class="account-row">
        <div class="sk sk-account-key" style="animation-delay:.1s"></div>
        <div class="sk sk-account-val" style="animation-delay:.1s"></div>
      </div>
      <div class="account-row">
        <div class="sk sk-account-key" style="animation-delay:.2s"></div>
        <div class="sk sk-account-val" style="animation-delay:.2s"></div>
      </div>
    </div>

  </main>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    // ── Auth guard ────────────────────────────
    const token = localStorage.getItem('accessToken');
    if (!token) {
      window.location.href = 'index.html';
    }

    // ── Logout ────────────────────────────────
    async function logout() {
      const rt = localStorage.getItem('refreshToken');
      try {
        await fetch(`${API_BASE}/auth/logout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ refreshToken: rt }),
        });
      } catch { /* always clear local data even if network fails */ }
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      window.location.href = 'index.html';
    }

    // ── Escape helper ─────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Render user data ──────────────────────
    function renderUser(user) {
      const plan  = (user.plan || 'FREE').toUpperCase();
      const planClass = plan === 'PRO' ? 'pro' : plan === 'ENTERPRISE' ? 'enterprise' : 'free';
      const planDot   = plan === 'PRO' ? '✦' : plan === 'ENTERPRISE' ? '◈' : '·';

      // Hero
      document.getElementById('heroSection').innerHTML = `
        <p class="hero-greeting">Good to see you,</p>
        <h1 class="hero-name">${escapeHtml(user.name || user.email)}</h1>
        <span class="hero-plan ${planClass}">${planDot} ${escapeHtml(plan)}</span>
      `;

      // Stats
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <p class="stat-label">Plan</p>
          <p class="stat-value">${escapeHtml(plan)}</p>
          <p class="stat-sub">${plan === 'FREE' ? 'Limited access' : plan === 'PRO' ? 'Full access' : 'Unlimited'}</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Email</p>
          <p class="stat-value" style="font-size:14px;word-break:break-all">${escapeHtml(user.email || '—')}</p>
          <p class="stat-sub">${user.email_verified ? 'Verified' : 'Unverified'}</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Member since</p>
          <p class="stat-value" style="font-size:16px">${user.created_at ? new Date(user.created_at).toLocaleDateString('en-IN', { month: 'short', year: 'numeric' }) : '—'}</p>
          <p class="stat-sub">Account active</p>
        </div>
      `;

      // Account rows
      document.getElementById('accountCard').innerHTML = `
        <div class="account-row">
          <span class="account-key">Name</span>
          <span class="account-val">${escapeHtml(user.name || '—')}</span>
        </div>
        <div class="account-row">
          <span class="account-key">Email</span>
          <span class="account-val">${escapeHtml(user.email || '—')}</span>
        </div>
        <div class="account-row">
          <span class="account-key">Plan</span>
          <span class="account-val">${escapeHtml(plan)}</span>
        </div>
        <div class="account-row">
          <span class="account-key">User ID</span>
          <span class="account-val" style="font-size:11px;color:var(--muted)">${escapeHtml(user.id || '—')}</span>
        </div>
      `;
    }

    // ── Fetch user ────────────────────────────
    async function fetchUser() {
      try {
        const res = await fetch(`${API_BASE}/user/me`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (res.status === 401) {
          logout();
          return;
        }
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        renderUser(data.user || data);
      } catch (err) {
        // Show error state in hero area only; keep skeleton in stats/account
        document.getElementById('heroSection').innerHTML = `
          <p class="hero-greeting" style="color:#f87171">Failed to load profile</p>
          <p style="font-size:13px;color:var(--muted);margin-top:4px">${escapeHtml(err.message || 'Unable to reach server.')}</p>
          <button onclick="fetchUser()" style="margin-top:12px;padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;">
            Retry
          </button>
        `;
      }
    }

    fetchUser();
  </script>
</body>
</html>
